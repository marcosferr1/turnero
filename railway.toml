# Monorepo: el backend vive en backend/. Si configurás Root Directory = backend
# en Railway, usá backend/railway.toml en su lugar.

[build]
builder = "RAILPACK"
buildCommand = "cd backend && npm ci && npx prisma generate && npm run build"

[deploy]
startCommand = "cd backend && npx prisma migrate deploy && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
