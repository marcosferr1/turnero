# Monorepo: build desde la raíz del repo (Root Directory vacío o "/").
# Recomendado: Root Directory = backend + Config file = /backend/railway.toml
# (ver backend/railway.toml). Railpack usa railpack.json en cada caso.

[build]
builder = "RAILPACK"
buildCommand = "cd backend && npm ci && npm run build"

[deploy]
startCommand = "cd backend && npx prisma migrate deploy && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
